name: FastAlloc CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build Project
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Run Correctness Tests (Google Test)
      run: ctest --test-dir build -C ${{ matrix.build_type }} -V

    - name: Run Benchmarks (Validation)
      # We run the benchmark for a brief period to ensure no runtime crashes.
      shell: bash
      run: |
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          # On Windows (MSVC), executables are often in build/Release/ or build/Debug/
          if [ -f "./build/${{ matrix.build_type }}/fast_alloc_bench.exe" ]; then
            ./build/${{ matrix.build_type }}/fast_alloc_bench.exe --benchmark_min_time=0.1
            ./build/${{ matrix.build_type }}/fast_alloc_bench_extended.exe --benchmark_min_time=0.1
          else
            ./build/fast_alloc_bench.exe --benchmark_min_time=0.1
            ./build/fast_alloc_bench_extended.exe --benchmark_min_time=0.1
          fi
        else
          ./build/fast_alloc_bench --benchmark_min_time=0.1
          ./build/fast_alloc_bench_extended --benchmark_min_time=0.1
        fi
